name: Python CI/CD Pipeline

# 🔹 Trigger pipeline on push to demo/test/prod branches
# 🔹 Also run automatically every day at 10 AM
on:
  push:
    branches:
      - demo
      - test
      - prod

  schedule:
    - cron: "0 10 * * *"  # Runs daily at 10:00 AM UTC

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Install Python dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run your Python app
      - name: Run App
        run: python app.py

      # 5️⃣ Deploy based on branch (environment)
      - name: Deploy to Environment
        run: |
          echo "Branch detected: ${{ github.ref }}"
          if [ "${{ github.ref }}" == "refs/heads/demo" ]; then
            echo "Deploying to DEMO environment"
            # Add real demo deploy commands here
          elif [ "${{ github.ref }}" == "refs/heads/test" ]; then
            echo "Deploying to TEST environment"
            # Add real test deploy commands here
          elif [ "${{ github.ref }}" == "refs/heads/prod" ]; then
            echo "Deploying to PROD environment"
            # Add real prod deploy commands here
          else
            echo "Branch does not match any environment. Skipping deploy."
          fi